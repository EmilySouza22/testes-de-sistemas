services:
  db:
    image: mysql:8.0
    platform: linux/arm64/v8
    container_name: catcafe_shop_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: catcafe_shop
      MYSQL_USER: catcafe_user
      MYSQL_PASSWORD: catcafe_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql

volumes:
  mysql_data: